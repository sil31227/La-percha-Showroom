<!-- @dsCard group="Seller Dashboard" viewport="1280x760" name="Seller Dashboard — desktop" subtitle="Ventas, ganancias, publicaciones y retiro de fondos" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>La Percha — Panel de Vendedor</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg-page); }
  #root { height: 100vh; display: flex; overflow: hidden; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 9px; }
  table { border-collapse: collapse; width: 100%; }
  th { text-align: left; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-subtle); font-weight: 700; padding: 0 14px 10px; }
  td { padding: 14px; border-top: 1px solid var(--border-subtle); font-size: 14px; color: var(--text-body); }
</style>
</head>
<body>
<div id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../shopper-app/data.js"></script>
<script type="text/babel" src="panel-chrome.js"></script>
<script type="text/babel">
const DS = window.LaPerchaShowroomDesignSystem_72de99;
const { Button, Badge, StatusPill, Tabs, Rating } = DS;
const PI = window.PanelIcons;
const D = window.LP_DATA;

const listings = [
  { id: 'f1', title: 'Vestido de lino natural manga corta', price: 18900, status: 'aprobada', stock: 3, sold: 12, img: 1 },
  { id: 'f4', title: 'Jean mom fit celeste claro', price: 21500, status: 'revision', stock: 1, sold: 0, img: 2 },
  { id: 'f2', title: 'Campera de jean oversize tiro alto', price: 26500, status: 'aprobada', stock: 2, sold: 5, img: 3 },
  { id: 'x9', title: 'Remera básica algodón peinado', price: 8900, status: 'cambios', stock: 5, sold: 0, img: 4 },
  { id: 'x7', title: 'Pollera midi tableada', price: 15400, status: 'rechazada', stock: 0, sold: 0, img: 5 },
];

function Seller() {
  const [nav, setNav] = React.useState('inicio');
  const [tab, setTab] = React.useState('todas');
  const filtered = tab === 'todas' ? listings : listings.filter(l => tab === 'activas' ? l.status === 'aprobada' : l.status === 'revision' || l.status === 'cambios');

  return (
    <>
      <window.Sidebar role="Vendedor" active={nav} onSelect={setNav} items={[
        { key: 'inicio', label: 'Inicio', icon: PI.grid },
        { key: 'pub', label: 'Publicaciones', icon: PI.tag, badge: 5 },
        { key: 'ventas', label: 'Ventas', icon: PI.cart, badge: 2 },
        { key: 'ganancias', label: 'Ganancias', icon: PI.wallet },
        { key: 'stats', label: 'Estadísticas', icon: PI.chart },
      ]} />
      <main style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <window.TopBar title="Hola, Caro 👋" sub="Caro Indumentaria · Feria de Ropa"
          right={<>
            <span style={{ color: 'var(--text-muted)' }}>{PI.bell}</span>
            <Button variant="primary" iconLeft={<span style={{ fontSize: 18, fontWeight: 700 }}>+</span>}>Publicar prenda</Button>
          </>} />
        <div style={{ flex: 1, overflowY: 'auto', padding: 28 }}>
          {/* Stats */}
          <div style={{ display: 'flex', gap: 16, marginBottom: 22 }}>
            <window.StatCard label="Ventas del mes" value="17" delta="+24%" tone="brand" icon={PI.cart} />
            <window.StatCard label="Ganancia disponible" value="$184.200" tone="mint" icon={PI.money} />
            <window.StatCard label="En revisión" value="2" tone="warning" icon={PI.tag} />
            <window.StatCard label="Calificación" value="4.8 ★" tone="neutral" icon={PI.chart} />
          </div>

          {/* Payout banner */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 18, background: 'linear-gradient(110deg, var(--sage-700), var(--sage-600))', borderRadius: 'var(--radius-lg)', padding: '18px 22px', marginBottom: 24, color: '#fff' }}>
            <span style={{ display: 'flex', width: 46, height: 46, borderRadius: 12, background: 'rgba(255,255,255,.18)', alignItems: 'center', justifyContent: 'center' }}>{PI.wallet}</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, opacity: .85 }}>Disponible para retirar (ya descontada la comisión 20%)</div>
              <div style={{ fontFamily: 'var(--font-ui)', fontWeight: 800, fontSize: 26 }}>$184.200</div>
            </div>
            <Button variant="secondary" style={{ background: '#fff', color: 'var(--sage-700)', border: 'none' }}>Solicitar retiro</Button>
          </div>

          {/* Listings */}
          <div style={{ background: 'var(--surface-card)', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
            <div style={{ padding: '6px 20px 0' }}>
              <Tabs active={tab} onChange={setTab} tabs={[
                { key: 'todas', label: 'Todas', count: listings.length },
                { key: 'activas', label: 'Activas' },
                { key: 'pendientes', label: 'Pendientes' },
              ]} />
            </div>
            <div style={{ padding: '6px 8px 8px' }}>
              <table>
                <thead><tr><th>Prenda</th><th>Precio</th><th>Estado</th><th>Stock</th><th>Vendidas</th><th></th></tr></thead>
                <tbody>
                  {filtered.map(l => (
                    <tr key={l.id}>
                      <td>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                          <div style={{ width: 44, height: 52, borderRadius: 8, background: 'linear-gradient(135deg, var(--taupe-100), var(--taupe-300))', flex: '0 0 44px' }} />
                          <span style={{ fontWeight: 600, color: 'var(--text-strong)' }}>{l.title}</span>
                        </div>
                      </td>
                      <td style={{ fontWeight: 700 }}>{D.fmt(l.price)}</td>
                      <td><StatusPill status={l.status} /></td>
                      <td>{l.stock}</td>
                      <td>{l.sold}</td>
                      <td style={{ textAlign: 'right' }}><span style={{ color: 'var(--text-subtle)', cursor: 'pointer', display: 'inline-flex' }}>{PI.edit}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Seller />);
</script>
</body>
</html>
