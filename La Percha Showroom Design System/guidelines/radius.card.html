<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-canvas); font-family:var(--font-ui); display:flex; gap:18px; flex-wrap:wrap; }
  .b { width:96px; }
  .box { height:72px; background:var(--mint-100); border:1.5px solid var(--mint-300); }
  .t { margin-top:8px; font-family:var(--font-mono); font-size:11px; color:var(--text-muted); }
</style></head>
<body>
<div class="b"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="t">sm · 8</div></div>
<div class="b"><div class="box" style="border-radius:var(--radius-md)"></div><div class="t">md · 12</div></div>
<div class="b"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="t">lg · 16</div></div>
<div class="b"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="t">xl · 22</div></div>
<div class="b"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="t">2xl · 28</div></div>
<div class="b"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="t">pill</div></div>
</body></html>
