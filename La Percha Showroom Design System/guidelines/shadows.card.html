<!-- @dsCard group="Spacing" viewport="700x190" name="Shadows" subtitle="Warm taupe-tinted elevation (never pure black)" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:30px; background:var(--bg-page); font-family:var(--font-ui); display:flex; gap:26px; flex-wrap:wrap; }
  .b { text-align:center; }
  .box { width:104px; height:70px; background:#fff; border-radius:var(--radius-lg); }
  .t { margin-top:12px; font-family:var(--font-mono); font-size:11px; color:var(--text-muted); }
</style></head>
<body>
<div class="b"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="t">xs</div></div>
<div class="b"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="t">sm · cards</div></div>
<div class="b"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="t">md · hover</div></div>
<div class="b"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="t">lg · sheets</div></div>
<div class="b"><div class="box" style="box-shadow:var(--shadow-brand)"></div><div class="t">brand · CTA</div></div>
</body></html>
