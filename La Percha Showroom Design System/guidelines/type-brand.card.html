<!-- @dsCard group="Type" viewport="700x170" name="Brand script & eyebrow" subtitle="Parisienne flourish + spaced-caps eyebrow — decorative only" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:26px; background:var(--bg-canvas); font-family:var(--font-ui); }
  .blk { display:flex; align-items:center; gap:36px; }
  .script { font-family:var(--font-script); font-size:54px; color:var(--ink-900); }
  .eyebrow { font-family:var(--font-ui); font-weight:600; font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--text-muted); }
  .note { margin-top:16px; font-size:12px; color:var(--text-subtle); max-width:560px; }
</style></head>
<body>
<div class="blk">
  <span class="script">La Percha</span>
  <div>
    <div class="eyebrow">Showroom</div>
    <div class="eyebrow" style="margin-top:8px; color:var(--sage-700)">Seleccionado&nbsp;·&nbsp;Importado</div>
  </div>
</div>
<p class="note">Parisienne echoes the wordmark — use it <b>only</b> for occasional brand flourishes (a greeting, a section flourish), never for UI or body. The spaced-caps eyebrow echoes "SHOWROOM" in the badge and labels sections/categories.</p>
</body></html>
