<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-canvas); font-family:var(--font-ui); display:flex; gap:28px; align-items:center; }
  .on { display:flex; gap:20px; }
  .chip { width:150px; height:150px; border-radius:18px; display:flex; align-items:center; justify-content:center; }
  img { width:120px; height:120px; border-radius:50%; object-fit:cover; }
  .notes { max-width:300px; }
  h4 { margin:0 0 8px; font-family:var(--font-display); font-weight:400; font-size:22px; color:var(--text-strong); }
  p { margin:0; font-size:13px; color:var(--text-muted); line-height:1.55; }
</style></head>
<body>
<div class="on">
  <div class="chip" style="background:var(--bg-page); border:1px solid var(--border-subtle)"><img src="../assets/logo.jpg" alt="La Percha Showroom" /></div>
  <div class="chip" style="background:var(--taupe-400)"><img src="../assets/logo.jpg" alt="La Percha Showroom sobre taupe" /></div>
  <div class="chip" style="background:var(--ink-900)"><img src="../assets/logo.jpg" alt="La Percha Showroom sobre ink" /></div>
</div>
<div class="notes">
  <h4>El sello</h4>
  <p>Insignia circular: percha de alambre, hoja verde, "La Percha" en script y "SHOWROOM" en capitales espaciadas. Mantener aire alrededor; no estirar ni recolorear. Sobre fondos oscuros, usar el sello completo dentro de su círculo claro.</p>
</div>
</body></html>
