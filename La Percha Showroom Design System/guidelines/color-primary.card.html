<!-- @dsCard group="Colors" viewport="700x180" name="Primary — Sage" subtitle="Brand green, drawn from the leaf. --brand = sage-600" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--bg-canvas); font-family:var(--font-ui); }
  .scale { display:flex; gap:0; border-radius:12px; overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .n { font-size:11px; font-weight:700; }
  .v { font-size:10px; opacity:.85; font-family:var(--font-mono); }
  .cap { margin-top:10px; font-size:12px; color:var(--text-muted); }
  b { color:var(--text-strong); }
</style></head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--sage-50)"><span class="n" style="color:var(--sage-700)">50</span><span class="v" style="color:var(--sage-700)">#f3f7ec</span></div>
  <div class="sw" style="background:var(--sage-100)"><span class="n" style="color:var(--sage-700)">100</span><span class="v" style="color:var(--sage-700)">#e3eed1</span></div>
  <div class="sw" style="background:var(--sage-200)"><span class="n" style="color:var(--sage-800)">200</span><span class="v" style="color:var(--sage-800)">#c9dcab</span></div>
  <div class="sw" style="background:var(--sage-300)"><span class="n" style="color:var(--sage-900)">300</span><span class="v" style="color:var(--sage-900)">#abc783</span></div>
  <div class="sw" style="background:var(--sage-400)"><span class="n" style="color:var(--sage-900)">400</span><span class="v" style="color:var(--sage-900)">#8db05e</span></div>
  <div class="sw" style="background:var(--sage-500)"><span class="n" style="color:#fff">500</span><span class="v" style="color:#fff">#739646</span></div>
  <div class="sw" style="background:var(--sage-600)"><span class="n" style="color:#fff">600 ★</span><span class="v" style="color:#fff">#5c7c38</span></div>
  <div class="sw" style="background:var(--sage-700)"><span class="n" style="color:#fff">700</span><span class="v" style="color:#fff">#47602c</span></div>
  <div class="sw" style="background:var(--sage-800)"><span class="n" style="color:#fff">800</span><span class="v" style="color:#fff">#384b25</span></div>
  <div class="sw" style="background:var(--sage-900)"><span class="n" style="color:#fff">900</span><span class="v" style="color:#fff">#2c3b1f</span></div>
</div>
<p class="cap"><b>--brand</b> = sage-600 · primary CTAs, active states, links (sage-700). Soft fills use sage-100.</p>
</body></html>
