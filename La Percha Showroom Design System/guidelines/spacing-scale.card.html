<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing scale" subtitle="4px base · --space-1 … --space-16" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-canvas); font-family:var(--font-ui); }
  .row { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
  .bar { height:18px; background:var(--sage-300); border-radius:4px; }
  .t { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); width:170px; }
</style></head>
<body>
<div class="row"><span class="t">--space-1 · 4px</span><div class="bar" style="width:4px"></div></div>
<div class="row"><span class="t">--space-2 · 8px</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="t">--space-3 · 12px</span><div class="bar" style="width:12px"></div></div>
<div class="row"><span class="t">--space-4 · 16px</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="t">--space-6 · 24px</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="t">--space-8 · 32px</span><div class="bar" style="width:32px"></div></div>
<div class="row"><span class="t">--space-12 · 48px</span><div class="bar" style="width:48px"></div></div>
<div class="row"><span class="t">--space-16 · 64px</span><div class="bar" style="width:64px"></div></div>
</body></html>
