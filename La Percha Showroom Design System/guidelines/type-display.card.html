<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:26px; background:var(--bg-canvas); }
  .row { display:flex; align-items:baseline; gap:14px; margin-bottom:10px; }
  .meta { font-family:var(--font-mono); font-size:11px; color:var(--text-subtle); width:120px; flex:0 0 120px; }
  .d { font-family:var(--font-display); color:var(--text-strong); letter-spacing:-0.01em; line-height:1.1; }
</style></head>
<body>
<div class="row"><span class="meta">4xl · 48</span><span class="d" style="font-size:48px">La Percha</span></div>
<div class="row"><span class="meta">3xl · 36</span><span class="d" style="font-size:36px">Feria de Ropa</span></div>
<div class="row"><span class="meta">2xl · 28</span><span class="d" style="font-size:28px">Tienda Oficial seleccionada</span></div>
<div class="row"><span class="meta">xl · 22</span><span class="d" style="font-size:22px">Lo nuevo de esta semana en el showroom</span></div>
</body></html>
