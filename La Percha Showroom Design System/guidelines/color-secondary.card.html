<!-- @dsCard group="Colors" viewport="700x150" name="Secondary — Mint" subtitle="The badge ring. Soft blue-green accent, used sparingly" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--bg-canvas); font-family:var(--font-ui); }
  .scale { display:flex; border-radius:12px; overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .n { font-size:11px; font-weight:700; }
  .v { font-size:10px; opacity:.85; font-family:var(--font-mono); }
  .cap { margin-top:10px; font-size:12px; color:var(--text-muted); }
</style></head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--mint-50)"><span class="n" style="color:var(--mint-700)">50</span><span class="v" style="color:var(--mint-700)">#eff7f5</span></div>
  <div class="sw" style="background:var(--mint-100)"><span class="n" style="color:var(--mint-700)">100</span><span class="v" style="color:var(--mint-700)">#d9ece8</span></div>
  <div class="sw" style="background:var(--mint-200)"><span class="n" style="color:var(--mint-700)">200</span><span class="v" style="color:var(--mint-700)">#bfe0da</span></div>
  <div class="sw" style="background:var(--mint-300)"><span class="n" style="color:var(--mint-700)">300</span><span class="v" style="color:var(--mint-700)">#9bccc3</span></div>
  <div class="sw" style="background:var(--mint-400)"><span class="n" style="color:#fff">400</span><span class="v" style="color:#fff">#71b1a6</span></div>
  <div class="sw" style="background:var(--mint-500)"><span class="n" style="color:#fff">500 ★</span><span class="v" style="color:#fff">#4f9489</span></div>
  <div class="sw" style="background:var(--mint-600)"><span class="n" style="color:#fff">600</span><span class="v" style="color:#fff">#3d7870</span></div>
  <div class="sw" style="background:var(--mint-700)"><span class="n" style="color:#fff">700</span><span class="v" style="color:#fff">#325f59</span></div>
</div>
<p class="cap"><b>--accent</b> = mint-500 · "Envío gratis" badges, secondary buttons, info highlights. Never competes with sage for primary actions.</p>
</body></html>
