<!-- @dsCard group="Components" viewport="700x440" name="Buttons & Inputs" subtitle="Actions, icon buttons, fields, toggles, steppers" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); font-family: var(--font-ui); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 18px; }
  .lbl { width: 100%; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-subtle); font-weight: 700; margin-bottom: 2px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 460px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { Button, IconButton, Input, Switch, QuantityStepper } = window.LaPerchaShowroomDesignSystem_72de99;
const Heart = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>;
const Search = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>;
function Demo() {
  const [sw, setSw] = React.useState(true);
  const [q, setQ] = React.useState(2);
  return (
    <div>
      <div className="row"><span className="lbl">Variants</span>
        <Button variant="primary">Comprar ahora</Button>
        <Button variant="secondary">Guardar</Button>
        <Button variant="outline">Ver más</Button>
        <Button variant="ghost">Cancelar</Button>
        <Button variant="danger">Eliminar</Button>
      </div>
      <div className="row"><span className="lbl">Sizes / states</span>
        <Button size="sm">Small</Button>
        <Button size="md" iconLeft={<Heart/>}>Favorito</Button>
        <Button size="lg">Large</Button>
        <Button disabled>Disabled</Button>
        <IconButton variant="soft" ariaLabel="fav"><Heart/></IconButton>
        <IconButton variant="brand" ariaLabel="add">+</IconButton>
        <IconButton active ariaLabel="liked"><Heart/></IconButton>
        <QuantityStepper value={q} onChange={setQ} />
        <Switch label="Envío gratis" checked={sw} onChange={setSw} />
      </div>
      <div className="grid2">
        <Input label="Buscar" placeholder="Buscar prendas…" iconLeft={<Search/>} />
        <Input label="Cupón" defaultValue="VERANO" error="Código inválido" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
