<!-- @dsCard group="Components" viewport="700x320" name="Bottom Nav & Tabs" subtitle="Mobile tab bar and in-page underline tabs" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); font-family: var(--font-ui); }
  .lbl { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-subtle); font-weight: 700; margin: 0 0 10px; }
  .phone { width: 390px; border: 1px solid var(--border-default); border-radius: 22px; overflow: hidden; box-shadow: var(--shadow-md); background: #fff; margin-bottom: 22px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { BottomNav, Tabs } = window.LaPerchaShowroomDesignSystem_72de99;
const I = (d, fill) => <svg width="22" height="22" viewBox="0 0 24 24" fill={fill?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const icons = {
  home: I(<><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></>),
  search: I(<><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></>),
  plus: I(<><path d="M12 5v14M5 12h14"/></>),
  heart: I(<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>),
  user: I(<><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></>),
};
function Demo() {
  const [tab, setTab] = React.useState('home');
  const [sec, setSec] = React.useState('desc');
  return (
    <div>
      <p className="lbl">Bottom navigation</p>
      <div className="phone">
        <div style={{height:120, background:'var(--surface-sunken)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-subtle)'}}>contenido</div>
        <BottomNav active={tab} onChange={setTab} items={[
          {key:'home', label:'Inicio', icon:icons.home},
          {key:'search', label:'Buscar', icon:icons.search},
          {key:'sell', label:'Vender', icon:icons.plus, accent:true},
          {key:'fav', label:'Favoritos', icon:icons.heart, badge:3},
          {key:'me', label:'Perfil', icon:icons.user},
        ]} />
      </div>
      <p className="lbl">In-page tabs</p>
      <div style={{maxWidth:420, background:'#fff', borderRadius:14, padding:'4px 16px 0', border:'1px solid var(--border-subtle)'}}>
        <Tabs active={sec} onChange={setSec} tabs={[
          {key:'desc', label:'Descripción'},
          {key:'rev', label:'Reseñas', count:32},
          {key:'ship', label:'Envío'},
        ]} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
