<!-- @dsCard group="Components" viewport="700x420" name="Product Card & Price" subtitle="Marketplace tile for Tienda Oficial & Feria de Ropa" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); font-family: var(--font-ui); }
  .grid { display: grid; grid-template-columns: repeat(3, 200px); gap: 16px; }
  .lbl { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-subtle); font-weight: 700; margin: 0 0 14px; }
</style>
</head>
<body>
<p class="lbl">Product cards</p>
<div id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { ProductCard } = window.LaPerchaShowroomDesignSystem_72de99;
function Demo() {
  const [fav, setFav] = React.useState({a:true});
  const t = (k) => setFav(f => ({...f, [k]: !f[k]}));
  return (
    <div className="grid">
      <ProductCard title="Vestido de lino natural manga corta" price={18900} original={24000}
        rating={4.5} reviews={32} freeShipping seller="Caro Indumentaria"
        favorite={!!fav.a} onToggleFavorite={() => t('a')} />
      <ProductCard title="Set de mates artesanales pintados a mano" price={12500}
        official rating={5} reviews={8} favorite={!!fav.b} onToggleFavorite={() => t('b')} />
      <ProductCard title="Campera de jean oversize tiro alto" price={26500}
        rating={4} reviews={17} seller="Vintage Bahía" favorite={!!fav.c} onToggleFavorite={() => t('c')} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
