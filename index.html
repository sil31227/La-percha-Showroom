<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>La Percha Showroom</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 16px; padding: 48px 40px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.08); max-width: 400px; width: 90%; }
  .logo { font-size: 28px; font-weight: 700; color: #2d2d2d; margin-bottom: 8px; }
  .sub { color: #888; font-size: 14px; margin-bottom: 40px; }
  .btn { display: block; padding: 14px 24px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 15px; margin-bottom: 12px; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #8b7355; color: #fff; }
  .btn-secondary { background: #f0ebe4; color: #4a3f35; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">La Percha Showroom</div>
  <div class="sub">Seleccioná la app que querés ver</div>
  <a class="btn btn-primary" href="/client">App Cliente (mobile)</a>
  <a class="btn btn-secondary" href="La%20Percha%20Showroom%20Design%20System/ui_kits/admin/index.html">Panel Admin</a>
</div>
</body>
</html>
